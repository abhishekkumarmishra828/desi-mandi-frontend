<!DOCTYPE html><html><head><title>Book Slot</title><link rel="stylesheet" href="/css/style.css"></head><body><script src="/js/common.js"></script><script src="/js/i18n.js"></script><script>document.write(nav('slot'))</script><main class="main"><h1>Book Slot</h1><p data-user></p><form class="card" method="POST" action="/api/bookings" style="max-width:760px"><div class="row"><div><label>Product</label><select name="product"><option>Potato</option><option>Tomato</option><option>Onion</option><option>Mango</option></select></div><div><label>Quantity</label><input class="input" name="quantity" type="number" value="500"></div></div><div class="row"><div><label>Buyer</label><select name="buyerName" id="buyer"></select></div><div><label>Place</label><input class="input" name="place" id="place"></div></div><div class="row"><div><label>Date</label><input class="input" name="preferredDate" type="date"></div><div><label>Time</label><select name="preferredTime"><option>10:00 AM - 11:00 AM</option><option>12:00 PM - 01:00 PM</option><option>03:00 PM - 04:00 PM</option></select></div></div><br><button class="btn full">Submit Slot Query</button></form></main><script>initHeader();let vendors=[];fetch('/api/vendors').then(r=>r.json()).then(v=>{vendors=v;buyer.innerHTML=v.map(x=>`<option>${x.name}</option>`).join(''); if(v[0])place.value=v[0].place});buyer.onchange=()=>{let v=vendors.find(x=>x.name===buyer.value);if(v)place.value=v.place}</script><script>applyTranslations(); injectFooter();</script></body></html>
