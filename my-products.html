<!DOCTYPE html><html><head><title>My Products</title><link rel="stylesheet" href="/css/style.css"></head><body><script src="/js/common.js"></script><script src="/js/i18n.js"></script><script>document.write(nav('products'))</script><main class="main"><div class="top"><h1 data-user></h1><a class="btn" href="/sell-product">Post New</a></div><section class="card"><h2>My Posted Products</h2><div class="grid" id="products"></div></section></main><script>initHeader();fetch('/api/products/mine').then(r=>r.json()).then(data=>products.innerHTML=data.length?data.map(p=>`<div class="product-card">${p.imagePath?`<img class="product-img" src="${p.imagePath}">`:''}<h3>${p.product}</h3><p>${p.quantity} kg · ₹${p.expectedPrice}/kg</p><div class="score"><span style="width:${p.qualityScore}%"></span></div><b>AI Score: ${p.qualityScore}%</b><br><span class="badge">${p.qualityLabel}</span><p>${p.sellingPlace}</p><span class="badge">${p.status}</span></div>`).join(''):'<p>No product posted.</p>')</script><script>applyTranslations(); injectFooter();</script></body></html>
