<!DOCTYPE html><html><head><title>Buyers</title><link rel="stylesheet" href="/css/style.css"></head><body><script src="/js/common.js"></script><script src="/js/i18n.js"></script><script>document.write(nav('buyers'))</script><main class="main"><div class="top"><h1 data-user></h1><a class="btn" href="/buyer-map">Open Buyer Map</a></div><section class="card"><h2>District-wise Buyers</h2><div class="grid" id="vendors"></div></section></main><script>initHeader();fetch('/api/vendors').then(r=>r.json()).then(data=>vendors.innerHTML=data.map(v=>`<div class="buyer-card"><h3>${v.name}</h3><p>${v.place}</p><h3>₹${v.price}/kg · ${v.product}</h3><a class="btn full" href="/book-slot">Book Slot</a></div>`).join(''))</script><script>applyTranslations(); injectFooter();</script></body></html>
